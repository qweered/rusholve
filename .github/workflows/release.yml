name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to (re)build a release for, e.g. v0.0.1"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: build
        run: cargo build --release --locked --target "$TARGET"

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          # Strip leading 'v' (e.g. v0.0.1 -> 0.0.1) for the archive stem.
          version="${RELEASE_TAG#v}"
          stem="rusholve-${version}-${TARGET}"
          mkdir -p "dist/${stem}"
          cp "target/${TARGET}/release/rusholve" "dist/${stem}/"
          cp README.md LICENSE "dist/${stem}/"
          tar -C dist -czf "dist/${stem}.tar.gz" "${stem}"
          ( cd dist && shasum -a 256 "${stem}.tar.gz" > "${stem}.tar.gz.sha256" )
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -lh dist

      - name: detect prerelease
        id: meta
        shell: bash
        run: |
          if [[ "$RELEASE_TAG" == *-* ]] || [[ "$RELEASE_TAG" == v0.0.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          fail_on_unmatched_files: true
